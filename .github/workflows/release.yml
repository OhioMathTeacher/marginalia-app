name: Release (Close Reader)

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# or run it by hand from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (.dmg / .app)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest      # Intel (.dmg / .app)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04      # Linux (.deb / .rpm / .AppImage)
            args: ''
          - platform: windows-latest    # Windows (.msi / NSIS .exe)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libssl-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app + create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Close Reader ${{ github.ref_name }}'
          releaseBody: |
            Free, offline close-reading companion. Download the file for your
            system below.

            - macOS: `.dmg` (unsigned — right-click the app and choose **Open**
              the first time to get past Gatekeeper)
            - Windows: `.msi` or `-setup.exe` (unsigned — click **More info →
              Run anyway** on the SmartScreen prompt)
            - Linux: `.AppImage`, `.deb`, or `.rpm`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
